version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: talkflow-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-talkflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-talkflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U talkflow" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (Message Broker)
  redis:
    image: redis:7-alpine
    container_name: talkflow-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5

  # MinIO (S3-compatible storage)
  minio:
    image: minio/minio:latest
    container_name: talkflow-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3

  # Frontend (Vite + Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: talkflow-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: talkflow-backend
    working_dir: /app/api_server
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-talkflow}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-talkflow}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MODELS_PATH: /app/models
      UPLOAD_DIR: /app/data/uploads
      PROCESSING_DIR: /app/data/processing
      OUTPUT_DIR: /app/data/outputs
    volumes:
      - .:/app
      - models_data:/app/models
      - data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  # Celery Worker (GPU-enabled)
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: talkflow-worker
    working_dir: /app/api_server
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=1
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-talkflow}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-talkflow}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MODELS_PATH: /app/models
      UPLOAD_DIR: /app/data/uploads
      PROCESSING_DIR: /app/data/processing
      OUTPUT_DIR: /app/data/outputs
    volumes:
      - .:/app
      - models_data:/app/models
      - data:/app/data
    depends_on:
      - postgres
      - redis
      - minio
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]

  # Celery Flower (Monitor)
  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: talkflow-flower
    working_dir: /app/api_server
    command: celery -A app.workers.celery_app flower --port=5555
    environment:
      REDIS_URL: redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - worker

  # NGINX (Reverse Proxy)
  nginx:
    image: nginx:alpine
    container_name: talkflow-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  redis_data:
  minio_data:
  models_data:
  data:
